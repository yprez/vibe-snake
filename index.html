<style>
  :root{
    --bg:#0a0e16; --bg-glow:#14213a;
    --emerald:#10b981; --emerald-light:#34d399;
    --rose:#fb7185; --gold:#fde047;
    --text:#e8eef6; --muted:#8b98ad;
    --panel:rgba(17,24,39,.72); --line:rgba(255,255,255,.07);
    --board:#0b1120;
    color-scheme:dark;
  }
  *{ box-sizing:border-box; }
  html,body{ height:100%; margin:0; overscroll-behavior:none; }  /* no pull-to-refresh / bounce stealing swipes */
  body{
    font-family:system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:radial-gradient(1200px 820px at 50% -12%, var(--bg-glow) 0%, var(--bg) 55%);
    color:var(--text);
    display:flex; align-items:center; justify-content:center;
    align-items:safe center; justify-content:safe center;  /* never push the header off the top when the board is a touch too tall */
    min-height:100%; min-height:100dvh; height:100dvh; overflow:hidden;  /* dvh tracks the visible area as the mobile URL bar shows/hides */
    -webkit-user-select:none; user-select:none; -webkit-tap-highlight-color:transparent;
    transition:background .5s ease;
  }
  body::before{
    content:""; position:fixed; inset:-25%;
    background:
      radial-gradient(620px 620px at 22% 18%, rgba(16,185,129,.10), transparent 60%),
      radial-gradient(540px 540px at 80% 82%, rgba(244,63,94,.08), transparent 62%),
      radial-gradient(500px 500px at 60% 30%, rgba(99,102,241,.07), transparent 60%);
    filter:blur(14px); animation:drift 22s ease-in-out infinite alternate; z-index:0; pointer-events:none;
  }
  @keyframes drift{ to{ transform:translate3d(0,-3%,0) scale(1.07); } }

  .app{
    position:relative; z-index:1; width:100%; max-width:660px;
    padding:14px;
    padding-top:calc(14px + env(safe-area-inset-top));
    padding-right:calc(14px + env(safe-area-inset-right));
    padding-bottom:calc(14px + env(safe-area-inset-bottom));
    padding-left:calc(14px + env(safe-area-inset-left));
    display:flex; flex-direction:column; align-items:center; gap:12px;
  }
  header.top, .hud, footer{ max-width:760px; margin-left:auto; margin-right:auto; }
  header.top{ width:100%; display:flex; align-items:center; justify-content:space-between; gap:12px; }
  .logo{
    margin:0; font-weight:800; letter-spacing:.30em; font-size:clamp(20px,5.2vw,30px);
    background:linear-gradient(180deg,var(--emerald-light),var(--emerald) 78%);
    -webkit-background-clip:text; background-clip:text; color:transparent;
    text-shadow:0 0 34px rgba(16,185,129,.30); padding-left:.30em; white-space:nowrap;
    flex:1; min-width:0; overflow:hidden; text-overflow:ellipsis;
  }
  .logo .dot{ color:var(--rose); -webkit-text-fill-color:var(--rose); }
  .tools{ display:flex; gap:7px; }
  .icon-btn{
    width:40px; height:40px; display:grid; place-items:center; border-radius:12px; cursor:pointer;
    background:var(--panel); border:1px solid var(--line); color:var(--text); backdrop-filter:blur(8px);
    transition:transform .08s ease, border-color .2s, background .2s, color .2s;
  }
  .icon-btn:hover{ border-color:var(--emerald); }
  .icon-btn:active{ transform:scale(.9); }
  .icon-btn.off{ color:var(--muted); opacity:.6; }
  .icon-btn svg{ width:19px; height:19px; }

  .hud{ width:100%; display:flex; gap:9px; }
  .stat{ flex:1; min-width:0; background:var(--panel); border:1px solid var(--line); border-radius:14px; padding:8px 13px; backdrop-filter:blur(8px); text-align:center; }
  .stat .k{ font-size:12px; letter-spacing:.16em; color:var(--muted); text-transform:uppercase; }
  .stat .v{ font-size:clamp(18px,4.6vw,24px); font-weight:750; font-variant-numeric:tabular-nums; line-height:1.18; }
  .stat.best .v{ color:var(--emerald-light); }
  .stat .v.bump{ animation:bump .3s ease; }
  @keyframes bump{ 0%{transform:scale(1)} 40%{transform:scale(1.22); color:#fff} 100%{transform:scale(1)} }

  .board-wrap{ position:relative; width:100%; display:grid; place-items:center; will-change:transform; }
  canvas{
    display:block; border-radius:18px; border:1px solid var(--line); background:var(--board);
    box-shadow:0 24px 70px rgba(0,0,0,.55), inset 0 0 0 1px rgba(255,255,255,.02);
    touch-action:none; transition:filter .25s ease;
  }
  .board-wrap.dying canvas{ filter:grayscale(.55) brightness(1.06); }

  .fx{ position:absolute; inset:0; border-radius:18px; pointer-events:none; }
  .vignette{ box-shadow:inset 0 0 90px rgba(0,0,0,.55), inset 0 0 30px rgba(0,0,0,.4); }
  .crt{ opacity:0; transition:opacity .3s; mix-blend-mode:soft-light; }
  body.crt-on .crt{ opacity:1; }
  .crt::before{ content:""; position:absolute; inset:0; border-radius:18px; background:repeating-linear-gradient(0deg, rgba(255,255,255,.05) 0px, rgba(255,255,255,.05) 1px, rgba(0,0,0,.18) 2px, rgba(0,0,0,.18) 3px); }
  .crt::after{ content:""; position:absolute; inset:0; border-radius:18px; background:radial-gradient(circle at 50% 50%, rgba(120,255,210,.05), transparent 70%); animation:flicker 7s infinite; }
  @keyframes flicker{ 0%,96%,100%{opacity:1} 97%{opacity:.93} 98%{opacity:.97} }
  @media (prefers-reduced-motion: reduce){
    .crt::after, body::before, .badge, .stat .v.bump, .combo .m.pulse, .panel{ animation:none !important; }
  }

  .mode-badge{ position:absolute; top:9px; left:11px; font-size:12px; letter-spacing:.13em; text-transform:uppercase; color:var(--muted); background:rgba(0,0,0,.32); padding:4px 9px; border-radius:8px; border:1px solid var(--line); pointer-events:none; opacity:0; transition:opacity .25s; }
  .board-wrap.playing .mode-badge{ opacity:1; }

  .effects{ position:absolute; top:8px; right:10px; display:flex; flex-direction:column; gap:5px; align-items:flex-end; pointer-events:none; }
  .chip{ display:none; align-items:center; gap:6px; background:rgba(0,0,0,.42); border:1px solid var(--line); border-radius:999px; padding:4px 9px 4px 8px; font-size:12px; font-weight:700; letter-spacing:.03em; }
  .chip.on{ display:flex; }
  .chip .dot{ width:9px; height:9px; border-radius:50%; }
  .chip[data-fx=magnet] .dot{ background:#60a5fa; box-shadow:0 0 8px #60a5fa; }
  .chip[data-fx=phase]  .dot{ background:#a78bfa; box-shadow:0 0 8px #a78bfa; }
  .chip[data-fx=slowmo] .dot{ background:#22d3ee; box-shadow:0 0 8px #22d3ee; }
  .chip .bar{ width:34px; height:3px; border-radius:2px; background:rgba(255,255,255,.18); overflow:hidden; }
  .chip .bar i{ display:block; height:100%; width:100%; transform-origin:left; background:#fff; }

  .combo{ position:absolute; top:8px; left:50%; transform:translateX(-50%) translateY(-8px); opacity:0; transition:opacity .2s, transform .2s; pointer-events:none; text-align:center; }
  .combo.show{ opacity:1; transform:translateX(-50%) translateY(0); }
  .combo .m{ font-weight:800; font-size:clamp(18px,4.6vw,22px); letter-spacing:.03em; background:linear-gradient(180deg,var(--gold),var(--rose)); -webkit-background-clip:text; background-clip:text; color:transparent; text-shadow:0 0 18px rgba(251,113,133,.5); }
  .combo .m.pulse{ animation:cpulse .28s ease; }
  @keyframes cpulse{ 0%{transform:scale(1)} 45%{transform:scale(1.28)} 100%{transform:scale(1)} }
  .combo .bar{ height:4px; width:96px; margin:3px auto 0; border-radius:3px; background:rgba(255,255,255,.13); overflow:hidden; }
  .combo .bar i{ display:block; height:100%; width:100%; transform-origin:left; background:linear-gradient(90deg,var(--gold),var(--rose)); }

  .overlay{ position:absolute; inset:0; display:grid; place-items:center; border-radius:18px; background:radial-gradient(circle at 50% 38%, rgba(8,11,18,.55), rgba(8,11,18,.86)); backdrop-filter:blur(5px); opacity:0; visibility:hidden; transition:opacity .28s ease, visibility .28s ease; padding:18px; z-index:5; }
  .overlay.show{ opacity:1; visibility:visible; }
  .panel{ text-align:center; max-width:96%; animation:pop .32s ease; }
  @keyframes pop{ from{ transform:translateY(8px) scale(.97); opacity:0; } }
  .panel h2{ margin:.05em 0 .1em; font-size:clamp(24px,6.4vw,34px); letter-spacing:.02em; font-weight:800; }
  .panel h2.win{ color:var(--emerald-light); }
  .panel .tag{ color:var(--muted); margin:.3em 0 1em; font-size:13.5px; }

  .opt-row{ margin:11px 0; text-align:center; }
  .opt-row .lbl{ font-size:12px; letter-spacing:.18em; text-transform:uppercase; color:var(--muted); margin-bottom:7px; }
  .seg{ display:inline-flex; flex-wrap:wrap; justify-content:center; background:rgba(255,255,255,.045); border:1px solid var(--line); border-radius:13px; padding:4px; gap:4px; }
  .seg button{ border:0; background:transparent; color:var(--muted); padding:8px 14px; border-radius:9px; cursor:pointer; font-weight:650; font-size:13px; letter-spacing:.02em; transition:background .15s, color .15s, transform .08s; }
  .seg button:active{ transform:scale(.95); }
  .seg button.active{ background:linear-gradient(180deg,var(--emerald-light),var(--emerald)); color:#04221a; box-shadow:0 6px 16px rgba(0,0,0,.25); }

  .btn{ margin-top:8px; border:0; cursor:pointer; background:linear-gradient(180deg,var(--emerald-light),var(--emerald)); color:#03251c; font-weight:800; letter-spacing:.03em; padding:13px 32px; border-radius:999px; font-size:16px; box-shadow:0 12px 30px rgba(0,0,0,.3); transition:transform .08s ease, box-shadow .2s; }
  .btn:hover{ transform:translateY(-1px); }
  .btn:active{ transform:translateY(1px); }

  .endstats{ display:flex; flex-wrap:wrap; gap:8px 26px; justify-content:center; margin:12px 0 4px; }
  .endstats .k{ font-size:12px; letter-spacing:.14em; color:var(--muted); text-transform:uppercase; }
  .endstats .v{ font-size:26px; font-weight:800; font-variant-numeric:tabular-nums; }
  .badge{ display:inline-block; margin-top:10px; padding:5px 13px; border-radius:999px; background:rgba(253,224,71,.12); border:1px solid rgba(253,224,71,.42); color:var(--gold); font-size:12px; font-weight:700; letter-spacing:.10em; animation:glow 1.4s ease-in-out infinite alternate; }
  @keyframes glow{ to{ box-shadow:0 0 22px rgba(253,224,71,.5); } }
  .share-row{ display:flex; gap:8px; justify-content:center; margin-top:12px; flex-wrap:wrap; }
  .sbtn{ border:1px solid var(--line); background:rgba(255,255,255,.05); color:var(--text); border-radius:999px; padding:9px 15px; font-size:13px; font-weight:700; cursor:pointer; display:inline-flex; align-items:center; gap:6px; transition:background .15s, border-color .15s, transform .08s; }
  .sbtn:hover{ border-color:var(--emerald); background:rgba(255,255,255,.09); }
  .sbtn:active{ transform:scale(.96); }
  .sbtn svg{ width:15px; height:15px; }
  .keys{ font-size:12px; color:var(--muted); margin-top:14px; line-height:1.8; }
  kbd{ font-family:inherit; font-size:12px; background:rgba(255,255,255,.07); border:1px solid var(--line); border-bottom-width:2px; border-radius:6px; padding:1px 7px; color:var(--text); }

  /* Settings sheet */
  .overlay.settings{ z-index:6; }
  .settings-list{ display:flex; flex-direction:column; gap:8px; margin:14px 0 8px; text-align:left; }
  .srow{ display:flex; align-items:center; justify-content:space-between; gap:16px; width:100%; background:rgba(255,255,255,.045); border:1px solid var(--line); color:var(--text); border-radius:12px; padding:11px 14px; cursor:pointer; font-size:14px; font-weight:600; transition:border-color .15s, background .15s; }
  .srow:hover{ border-color:var(--emerald); background:rgba(255,255,255,.07); }
  .switch{ position:relative; width:42px; height:24px; border-radius:999px; background:rgba(255,255,255,.16); transition:background .2s; flex:0 0 auto; }
  .switch::after{ content:""; position:absolute; top:3px; left:3px; width:18px; height:18px; border-radius:50%; background:#fff; transition:transform .2s; }
  .switch.on{ background:linear-gradient(180deg,var(--emerald-light),var(--emerald)); }
  .switch.on::after{ transform:translateX(18px); }

  /* Keyboard focus visibility (a11y) */
  .btn:focus-visible, .sbtn:focus-visible, .srow:focus-visible, .seg button:focus-visible, .icon-btn:focus-visible, .dpad button:focus-visible{ outline:2px solid var(--emerald-light); outline-offset:2px; }

  /* Visually hidden, still announced by screen readers */
  .sr-only{ position:absolute; width:1px; height:1px; padding:0; margin:-1px; overflow:hidden; clip:rect(0 0 0 0); white-space:nowrap; border:0; }

  .dpad{ display:none; grid-template-columns:repeat(3,1fr); grid-template-rows:repeat(2,56px); gap:9px; width:198px; margin-top:2px; }
  .dpad button{ background:var(--panel); border:1px solid var(--line); color:var(--text); border-radius:14px; display:grid; place-items:center; cursor:pointer; backdrop-filter:blur(8px); transition:transform .06s, background .15s; }
  .dpad button:active{ transform:scale(.93); background:rgba(52,211,153,.18); }
  .dpad button svg{ width:23px; height:23px; }
  .dpad .up{ grid-column:2; grid-row:1; } .dpad .left{ grid-column:1; grid-row:2; }
  .dpad .down{ grid-column:2; grid-row:2; } .dpad .right{ grid-column:3; grid-row:2; }
  @media (hover:none),(pointer:coarse){ .dpad{ display:grid; } .icon-btn{ width:44px; height:44px; } .icon-btn svg{ width:21px; height:21px; } .tools{ gap:8px; } }
  @media (max-width:480px){
    .logo{ letter-spacing:.16em; font-size:19px; padding-left:.16em; }
    .tools{ gap:6px; } .stat{ padding:7px 10px; }
  }
  footer{ color:var(--muted); font-size:12px; text-align:center; line-height:1.6; }
  footer a{ color:var(--emerald-light); text-decoration:none; }
  footer a:hover{ text-decoration:underline; }
  footer .src{ display:inline-flex; align-items:center; gap:5px; margin-top:3px; }
</style>
</head>
<body>
  <noscript><p style="color:#e8eef6;text-align:center;padding:2rem 1rem;font-family:system-ui">Vibe Snake needs JavaScript to run.</p></noscript>

<script>
(function(){
  "use strict";

  // ---------- Config ----------
  var START_LEN = 4, STEP_SPEEDUP = 3.5;
  var BONUS_EVERY = 5, BONUS_LIFE = 6.0, MAX_PARTICLES = 480;
  var FOOD_GROW = 1;                                                   // segments per apple
  var LEN_MULT = { points:2.0, magnet:1.5, slowmo:1.5, phase:1.5 };    // bonus gems multiply length
  var DEMO_INTERVAL = 95, MAX_TILT = 2.0;

  var MODES = {
    classic:{ label:"Classic", wrap:false, maze:false },
    wrap:   { label:"Wrap",    wrap:true,  maze:false },
    maze:   { label:"Maze",    wrap:false, maze:true  }
  };

  // ---------- Particles ----------
  function spawnBurst(cx,cy,color,count){
    if (reduceMotion) count = Math.min(count, 6);
    for (var i=0;i<count;i++){
      if (particles.length>=MAX_PARTICLES) break;
      var ang=Math.random()*Math.PI*2, sp=55+Math.random()*170, life=0.45+Math.random()*0.45;
      particles.push({ x:cx, y:cy, vx:Math.cos(ang)*sp, vy:Math.sin(ang)*sp-40, life:life, max:life, size:cell*(0.05+Math.random()*0.09), color:(Math.random()<0.35?"#ffffff":color), grav:300 });
    }
  }
  function spawnTrail(cx,cy,color){
    if (particles.length>=MAX_PARTICLES) return;
    var life=0.4+Math.random()*0.2;
    particles.push({ x:cx+(Math.random()-0.5)*cell*0.4, y:cy+(Math.random()-0.5)*cell*0.4, vx:(Math.random()-0.5)*30, vy:(Math.random()-0.5)*30-10, life:life, max:life, size:cell*(0.05+Math.random()*0.06), color:color, grav:40 });
  }
  function deathImpact(didWin){
    deathFlash=1; headPulse=1;
    if (!snake.length) return;
    var h=cellCenter(snake[0]);
    var col=didWin?THEME.css.emeraldLight:"#ff5a4d";
    spawnBurst(h.x, h.y, col, 24);   // debris at the crash point (not the whole snake)
    addRipple(h.x, h.y, col, 2.4);   // shockwave ring

  function updateParticles(dt){
    for (var i=particles.length-1;i>=0;i--){
      var p=particles[i]; p.life-=dt;
      if (p.life<=0){ particles.splice(i,1); continue; }
      p.vx *= (1-Math.min(1,2.0*dt)); p.vy += p.grav*dt; p.x += p.vx*dt; p.y += p.vy*dt;
    }
    if (shake>0) shake=Math.max(0, shake-dt*38);
    if (headPulse>0) headPulse=Math.max(0, headPulse-dt*4);
    if (deathFlash>0) deathFlash=Math.max(0, deathFlash-dt*1.1);
  }
  function drawParticles(){
    for (var i=0;i<particles.length;i++){ var p=particles[i]; ctx.globalAlpha=clamp(p.life/p.max,0,1); ctx.fillStyle=p.color; ctx.beginPath(); ctx.arc(p.x,p.y,p.size,0,Math.PI*2); ctx.fill(); }
    ctx.globalAlpha=1;
  }

  // ---------- Floats & ripples ----------

  function updateFloats(dt){ for (var i=floats.length-1;i>=0;i--){ var f=floats[i]; f.life-=dt; if (f.life<=0){ floats.splice(i,1); continue; } f.vy*=(1-dt*0.5); f.y+=f.vy*dt; } }

    ctx.globalAlpha=1;

  function addRipple(x,y,color,scale){ ripples.push({ x:x, y:y, r:cell*0.3, max:cell*(3.4*(scale||1)), life:0.55, maxLife:0.55, color:color }); }

  // ---------- Render ----------
  function render(t, now){
    ctx.save();

    drawBoardBase(); drawStars(now); drawGrid(); drawComboAura(now);
    drawObstacles(); drawRipples();
    if (food) drawFood(now);
    if (bonus) drawBonus(now);
    if (snake.length) drawSnake(t, now);
    drawParticles(); drawFloats();
    if (effects.slowmo>0){ ctx.fillStyle="rgba(34,211,238,0.055)"; ctx.fillRect(0,0,boardW,boardH); }
    ctx.restore();
  }
  function drawBoardBase(){ var g=ctx.createLinearGradient(0,0,boardW,boardH); g.addColorStop(0,THEME.boardA); g.addColorStop(1,THEME.boardB); ctx.fillStyle=g; ctx.fillRect(-14,-14,boardW+28,boardH+28); }

    ctx.fillStyle=THEME.checker;
    for (var x=0;x<COLS;x++) for (var y=0;y<ROWS;y++){ if ((x+y)%2===0) ctx.fillRect(x*cell,y*cell,cell,cell); }
    ctx.strokeStyle=THEME.grid; ctx.lineWidth=1; ctx.beginPath();
    for (var i=0;i<=COLS;i++){ var px=i*cell+0.5; ctx.moveTo(px,0); ctx.lineTo(px,boardH); }
    for (var j=0;j<=ROWS;j++){ var py=j*cell+0.5; ctx.moveTo(0,py); ctx.lineTo(boardW,py); }
    ctx.stroke();
  }
  function drawComboAura(now){
    var g=comboGlow(); if (g<=0.01) return;
    var cx=boardW/2, cy=boardH/2, rad=Math.max(boardW,boardH)*0.62, pulse=reduceMotion?1:(0.5+0.5*Math.sin(now/240));
    var gr=ctx.createRadialGradient(cx,cy,rad*0.2,cx,cy,rad);
    gr.addColorStop(0,"rgba("+THEME.auraRGB+","+(0.05+g*0.10*pulse)+")"); gr.addColorStop(1,"rgba("+THEME.auraRGB+",0)");
    ctx.fillStyle=gr; ctx.fillRect(0,0,boardW,boardH);
  }
  function drawObstacles(){
    for (var i=0;i<obstacleList.length;i++){
      var o=obstacleList[i], x=o.x*cell, y=o.y*cell;
      var g=ctx.createLinearGradient(x,y,x,y+cell); g.addColorStop(0,"#283449"); g.addColorStop(1,"#1b2434");
      ctx.fillStyle=g; roundRect(x+cell*0.08,y+cell*0.08,cell*0.84,cell*0.84,cell*0.18); ctx.fill();

  }
  function drawFood(now){
    var fcol=THEME.food, fglow=THEME.foodGlow, leaf=THEME.leaf;
    if (prefs.colorblind){ fcol=["#fff4d6","#fbbf24","#d97706"]; fglow="rgba(251,191,36,0.7)"; leaf="#a16207"; }
    var pulse=1+Math.sin(now/200)*0.06, cx=(food.x+0.5)*cell, cy=(food.y+0.5)*cell, r=cell*0.34*pulse;

  }
  function drawBonus(now){
    var P=POWERS[bonus.type]||POWERS.points;
    var cx=(bonus.x+0.5)*cell, cy=(bonus.y+0.5)*cell, pulse=1+Math.sin(now/120)*0.1, r=cell*0.36*pulse, frac=clamp(bonus.life/bonus.max,0,1);

  function drawPowerGlyph(type, cx, cy, r){
    ctx.save(); ctx.translate(cx,cy);

    ctx.lineWidth=Math.max(1.6, r*0.16); ctx.lineCap="round"; ctx.lineJoin="round";

      ctx.beginPath(); ctx.moveTo(-w,-r*0.05); ctx.lineTo(-w,r*0.5); ctx.moveTo(w,-r*0.05); ctx.lineTo(w,r*0.5); ctx.stroke();
      ctx.fillRect(-w-ctx.lineWidth*0.6, r*0.5-ctx.lineWidth, ctx.lineWidth*1.2, ctx.lineWidth);

      ctx.lineTo(gw,gh*0.55); ctx.lineTo(gw*0.5,gh*0.3); ctx.lineTo(0,gh*0.55); ctx.lineTo(-gw*0.5,gh*0.3); ctx.lineTo(-gw,gh*0.55); ctx.closePath(); ctx.stroke();
      ctx.fillStyle="rgba(255,255,255,0.92)"; ctx.beginPath(); ctx.arc(-gw*0.35,-gh*0.2,r*0.09,0,Math.PI*2); ctx.arc(gw*0.35,-gh*0.2,r*0.09,0,Math.PI*2); ctx.fill();
    } else if (type==="trim"){
      ctx.beginPath(); ctx.moveTo(-r*0.5,-r*0.5); ctx.lineTo(r*0.4,r*0.4); ctx.moveTo(r*0.5,-r*0.5); ctx.lineTo(-r*0.4,r*0.4); ctx.stroke();
      ctx.beginPath(); ctx.arc(-r*0.5,r*0.5,r*0.16,0,Math.PI*2); ctx.arc(r*0.5,r*0.5,r*0.16,0,Math.PI*2); ctx.stroke();
    }
    ctx.restore();
  }

  function cellCenter(c){ return { x:(c.x+0.5)*cell, y:(c.y+0.5)*cell }; }
  function adjacent(a,b){ return Math.abs(a.x-b.x)+Math.abs(a.y-b.y)===1; }
  function headPointAt(t){
    if (snake.length<2) return cellCenter(snake[0]);
    var c0=cellCenter(snake[0]), c1=cellCenter(snake[1]);
    if (!adjacent(snake[0],snake[1])) return c0;
    return { x:lerp(c1.x,c0.x,t), y:lerp(c1.y,c0.y,t) };
  }
  function bodyColors(now){
    var g=comboGlow(), s=THEME.sH, tc=THEME.sT, rainbow=THEME.rainbow, hH,hS,hL,tH,tS,tL;
    if (prefs.colorblind){ s={h:212,s:85,l:62}; tc={h:222,s:80,l:42}; rainbow=false; } // blue snake vs amber food
    if (rainbow){
      var hue=(now*0.06)%360;
      hH=lerp(s.h,hue,g); hS=lerp(s.s,90,g); hL=lerp(s.l,62,g);
      tH=lerp(tc.h,(hue+50)%360,g); tS=lerp(tc.s,84,g); tL=lerp(tc.l,44,g);
    } else {
      hH=s.h; hS=lerp(s.s,100,g); hL=lerp(s.l,72,g);
      tH=tc.h; tS=lerp(tc.s,100,g); tL=lerp(tc.l,50,g);
    }
    return { head:"hsl("+hH+","+hS+"%,"+hL+"%)", tail:"hsl("+tH+","+tS+"%,"+tL+"%)", headBright:"hsl("+hH+","+hS+"%,"+Math.min(82,hL+12)+"%)", glow:"hsla("+hH+","+hS+"%,"+hL+"%,"+(0.45+g*0.3)+")" };
  }
  function buildSnakePath(t){
    var L=snake.length, pts=[ headPointAt(t) ];
    for (var i=1;i<L;i++) pts.push(cellCenter(snake[i]));
    if (!grew && lastTailCell && adjacent(lastTailCell,snake[L-1])){
      var ot=cellCenter(lastTailCell), last=cellCenter(snake[L-1]);
      pts.push({ x:lerp(ot.x,last.x,t), y:lerp(ot.y,last.y,t) });
    }
    return pts;
  }
  function drawSnake(t, now){
    if (snake.length===0) return;
    var pts=buildSnakePath(t), maxGap=cell*1.5;
    var dead=(state==="dying"||state==="over") && !won;   // a corpse on loss; a win stays in full colour
    var col, phasing=false, alpha=1;
    if (dead){
      var rf=clamp(deathFlash,0,1);                        // 1 = just crashed (red) -> 0 = settled (slate)
      col={ head:"hsl("+lerp(212,6,rf)+","+lerp(10,80,rf)+"%,"+lerp(40,60,rf)+"%)",
            tail:"hsl("+lerp(212,2,rf)+","+lerp(8,55,rf)+"%,"+lerp(26,44,rf)+"%)",
            headBright:"hsl("+lerp(212,6,rf)+","+lerp(10,80,rf)+"%,"+lerp(52,70,rf)+"%)",
            glow:"hsla(6,80%,55%,"+(rf*0.6)+")" };
      alpha=0.5+rf*0.4;
    } else { col=bodyColors(now); phasing=effects.phase>0; }
    ctx.lineJoin="round"; ctx.lineCap="round";
    var grad=ctx.createLinearGradient(pts[0].x,pts[0].y,pts[pts.length-1].x,pts[pts.length-1].y);
    grad.addColorStop(0,col.head); grad.addColorStop(1,col.tail);
    ctx.save();
    ctx.globalAlpha = phasing ? (0.5+0.16*Math.sin(now/110)) : alpha;
    ctx.shadowColor=col.glow; ctx.shadowBlur=cell*(dead?(0.25+clamp(deathFlash,0,1)*0.7):(0.5+comboGlow()*0.7));
    ctx.strokeStyle=grad; ctx.lineWidth=cell*0.82; strokePathBroken(pts,maxGap);
    ctx.shadowBlur=0;
    if (!dead){ ctx.strokeStyle="rgba(220,255,238,0.34)"; ctx.lineWidth=cell*0.32; strokePathBroken(pts,maxGap); }
    if (phasing){ ctx.setLineDash([cell*0.5, cell*0.35]); ctx.strokeStyle="rgba(255,255,255,0.7)"; ctx.lineWidth=2; strokePathBroken(pts,maxGap); ctx.setLineDash([]); }
    ctx.restore();
    drawHead(pts[0], col, phasing, dead);
  }
  function strokePathBroken(pts, maxGap){
    ctx.beginPath(); var started=false;
    for (var i=0;i<pts.length;i++){
      if (started){ var dx=pts[i].x-pts[i-1].x, dy=pts[i].y-pts[i-1].y; if (dx*dx+dy*dy>maxGap*maxGap){ ctx.stroke(); ctx.beginPath(); started=false; } }
      if (!started){ ctx.moveTo(pts[i].x,pts[i].y); started=true; } else ctx.lineTo(pts[i].x,pts[i].y);
    }
    ctx.stroke();
  }
  function drawHead(p, col, phasing, dead){
    var r=cell*0.46*(1+headPulse*0.16);
    ctx.save();
    if (dead) ctx.globalAlpha=0.5+clamp(deathFlash,0,1)*0.4; else if (phasing) ctx.globalAlpha=0.7;
    ctx.shadowColor=col.glow; ctx.shadowBlur=cell*0.7; ctx.fillStyle=col.headBright;
    ctx.beginPath(); ctx.arc(p.x,p.y,r,0,Math.PI*2); ctx.fill();
    ctx.shadowBlur=0;
    var fx=dir.x, fy=dir.y, px=-fy, py=fx, fwd=r*0.34, spread=r*0.42, eyeR=r*0.27;
    if (dead){
      ctx.strokeStyle="#08131f"; ctx.lineWidth=Math.max(1.6,r*0.13); ctx.lineCap="round";
      for (var s=-1;s<=1;s+=2){ var x=p.x+fx*fwd+px*spread*s, y=p.y+fy*fwd+py*spread*s, q=eyeR*0.7;
        ctx.beginPath(); ctx.moveTo(x-q,y-q); ctx.lineTo(x+q,y+q); ctx.moveTo(x+q,y-q); ctx.lineTo(x-q,y+q); ctx.stroke(); }
    } else {
      var pupR=r*0.13;
      for (var s2=-1;s2<=1;s2+=2){ var ex=p.x+fx*fwd+px*spread*s2, ey=p.y+fy*fwd+py*spread*s2;
        ctx.fillStyle="#ffffff"; ctx.beginPath(); ctx.arc(ex,ey,eyeR,0,Math.PI*2); ctx.fill();
        ctx.fillStyle="#08131f"; ctx.beginPath(); ctx.arc(ex+fx*eyeR*0.35,ey+fy*eyeR*0.35,pupR,0,Math.PI*2); ctx.fill(); }
    }

  }
  function roundRect(x,y,w,h,r){ ctx.beginPath(); ctx.moveTo(x+r,y); ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r); ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath(); }

  // ---------- Attract mode (AI) ----------
  function demoReset(){
    obstacles={}; obstacleList=[];
    var midX=COLS>>1, midY=ROWS>>1;
    snake=[]; for (var i=0;i<START_LEN;i++) snake.push({ x:midX-i, y:midY });
    grew=false; lastTailCell=null; pendingGrow=0; dir={x:1,y:0}; queue=[]; bonus=null; food=null; placeFood();
  }
  // Autopilot AI (shared by in-game autopilot + attract mode).
  // BFS to the nearest reachable target, but only commit if, after virtually
  // eating it, the head can still reach the tail (so we don't seal ourselves
  // in). Else chase the tail to stall; else flee to the most open neighbour.
  function aiNeighbors(x,y,wrap){
    var ds=[[1,0],[-1,0],[0,1],[0,-1]], out=[];
    for (var i=0;i<4;i++){ var nx=x+ds[i][0], ny=y+ds[i][1];
      if (wrap){ nx=(nx+COLS)%COLS; ny=(ny+ROWS)%ROWS; }
      else if (nx<0||ny<0||nx>=COLS||ny>=ROWS) continue;
      out.push({x:nx,y:ny}); }
    return out;
  }
  function aiBlocked(body, excludeTail){
    var b={}, n=body.length;
    for (var i=0;i<n;i++){ if (excludeTail && i===n-1) continue; b[body[i].x+","+body[i].y]=1; }
    for (var k in obstacles) b[k]=1;
    return b;
  }
  function aiPath(start, goal, blocked, wrap){
    var sk=start.x+","+start.y, gk=goal.x+","+goal.y;
    if (sk===gk) return [];
    var came={}; came[sk]="-"; var q=[start], qi=0;
    while (qi<q.length){
      var cur=q[qi++], nb=aiNeighbors(cur.x,cur.y,wrap);
      for (var i=0;i<nb.length;i++){
        var n=nb[i], nk=n.x+","+n.y;
        if (came[nk]!==undefined) continue;
        if (blocked[nk] && nk!==gk) continue;
        came[nk]=cur.x+","+cur.y;
        if (nk===gk){ var path=[], k=nk; while (k!==sk){ var p=k.split(","); path.unshift({x:+p[0],y:+p[1]}); k=came[k]; } return path; }
        q.push(n);
      }
    }
    return null;
  }
  function aiStepDir(head, next, wrap){
    var dx=next.x-head.x, dy=next.y-head.y;
    if (wrap){ if (dx>1) dx-=COLS; else if (dx<-1) dx+=COLS; if (dy>1) dy-=ROWS; else if (dy<-1) dy+=ROWS; }
    return { x:(dx>0?1:(dx<0?-1:0)), y:(dy>0?1:(dy<0?-1:0)) };
  }
  function aiSimulate(body, path, growN){
    var b=[]; for (var i=0;i<body.length;i++) b.push({x:body[i].x,y:body[i].y});
    var L=path.length;
    for (var j=0;j<L;j++){ b.unshift({x:path[j].x,y:path[j].y}); if (!((L-1-j) < growN)) b.pop(); } // keep tail for the last growN steps
    return b;
  }
  function aiSafe(body, wrap){
    if (body.length<2) return true;
    return aiPath(body[0], body[body.length-1], aiBlocked(body, true), wrap)!==null;
  }
  function aiFlood(start, blocked, wrap, cap){
    var seen={}; seen[start.x+","+start.y]=1; var q=[start], qi=0, cnt=0;
    while (qi<q.length && cnt<cap){ var c=q[qi++]; cnt++; var nb=aiNeighbors(c.x,c.y,wrap);
      for (var i=0;i<nb.length;i++){ var n=nb[i], k=n.x+","+n.y; if (blocked[k]||seen[k]) continue; seen[k]=1; q.push(n); } }
    return cnt;
  }
  function aiNextDir(){
    if (!snake.length) return dir;
    var wrap = MODES[currentMode] ? MODES[currentMode].wrap : false;
    var head = snake[0], blocked = aiBlocked(snake, pendingGrow<=0); // tail is frozen while growth is pending
    var targets=[];
    if (food) targets.push({ x:food.x, y:food.y, grow:FOOD_GROW });
    if (bonus) targets.push({ x:bonus.x, y:bonus.y, grow:(bonus.type==="trim"?0:bonusGrow(bonus.type, snake.length)) });
    var best=null;
    for (var ti=0;ti<targets.length;ti++){

  function updatePauseIcon(){ var playing=state==="playing"; pauseBtn.innerHTML=playing?I.pause:I.play; pauseBtn.setAttribute("aria-label", playing?"Pause":(state==="paused"?"Resume":"Play")); }

  // ---------- Toggles ----------
  function toggleSound(){ prefs.sound=!prefs.sound; savePrefs(); syncSettings(); if (prefs.sound){ resumeAudio(); tone(740,0.07,"square",0.08,0); } }
  function toggleMusic(){ prefs.music=!prefs.music; savePrefs(); syncSettings(); if (prefs.music){ ensureAudio(); resumeAudio(); startMusicEngine(); } }
  function toggleCRT(){ prefs.crt=!prefs.crt; savePrefs(); document.body.classList.toggle("crt-on",prefs.crt); syncSettings(); }
  function toggleTilt(){ prefs.tilt=!prefs.tilt; savePrefs(); syncSettings(); if (!prefs.tilt) boardWrap.style.transform=""; }
  function toggleShake(){ prefs.shake=!prefs.shake; savePrefs(); syncSettings(); if (!prefs.shake) shake=0; }
  function toggleColorblind(){ prefs.colorblind=!prefs.colorblind; savePrefs(); syncSettings(); render(1, perfNow()); }
  function say(msg){ if (liveEl) liveEl.textContent = msg; }
  function setAutopilot(v){ prefs.autopilot=v; savePrefs(); updateIcons(); updateModeBadge(); if (v) queue=[]; say(v?"Autopilot on":"Autopilot off"); }
  function toggleAutopilot(){ setAutopilot(!prefs.autopilot); }
  function updateModeBadge(){ if (state==="playing") modeBadge.textContent = MODES[currentMode].label+" · "+DIFFS[currentDiff].label+(prefs.autopilot?" · AUTO":""); }
  function resetPrefs(){
    prefs = { sound:true, music:true, crt:false, tilt:true, autopilot:false, shake:true, colorblind:false, theme:"neon" };
    savePrefs();
    document.body.classList.toggle("crt-on", prefs.crt);
    applyTheme(prefs.theme);
    if (!prefs.tilt) boardWrap.style.transform="";
    updateIcons(); updateModeBadge(); syncSettings(); say("Preferences reset");
  }

  // ---------- Settings sheet ----------
  var SETTINGS = [
    { key:"sound", label:"Sound effects" }, { key:"music", label:"Music" },
    { key:"crt", label:"CRT scanlines" }, { key:"tilt", label:"Board tilt" },
    { key:"shake", label:"Screen shake" }, { key:"colorblind", label:"Colourblind palette" }
  ];
  function applyToggle(key){
    if (key==="sound") toggleSound(); else if (key==="music") toggleMusic(); else if (key==="crt") toggleCRT();
    else if (key==="tilt") toggleTilt(); else if (key==="shake") toggleShake(); else if (key==="colorblind") toggleColorblind();
  }
  function renderSettings(){
    var html='<div class="panel"><h2>Settings</h2><div class="settings-list">';
    for (var i=0;i<SETTINGS.length;i++){ var s=SETTINGS[i], on=!!prefs[s.key];
      html+='<button type="button" class="srow" data-toggle="'+s.key+'" role="switch" aria-checked="'+(on?"true":"false")+'"><span>'+s.label+'</span><span class="switch'+(on?" on":"")+'"></span></button>'; }
    html+='</div><div class="share-row"><button type="button" class="sbtn" data-action="reset">Reset</button><button type="button" class="btn" data-action="close-settings">Done</button></div></div>';
    settingsEl.innerHTML=html;
  }
  function syncSettings(){
    if (!settingsEl.classList.contains("show")) return;
    var rows=settingsEl.querySelectorAll("[data-toggle]");
    for (var i=0;i<rows.length;i++){ var key=rows[i].getAttribute("data-toggle"), on=!!prefs[key]; rows[i].setAttribute("aria-checked", on?"true":"false"); var sw=rows[i].querySelector(".switch"); if (sw) sw.classList.toggle("on", on); }
  }
  function openSettings(){ if (state==="playing") togglePause(); renderSettings(); settingsEl.classList.add("show"); focusFirst(settingsEl, ".srow"); }
  function closeSettings(){ settingsEl.classList.remove("show"); if (overlay.classList.contains("show")) focusFirst(overlay); }
  function focusFirst(dlg, sel){ try{ var b=(sel&&dlg.querySelector(sel))||dlg.querySelector(".btn")||dlg.querySelector("button"); if (b && b.focus) b.focus(); }catch(e){} }
  function trapTab(dlg, e){
    var f=dlg.querySelectorAll('button, [href], [tabindex]:not([tabindex="-1"])');
    f=Array.prototype.filter.call(f, function(el){ return el.offsetParent!==null; });
    if (!f.length) return;
    var first=f[0], last=f[f.length-1];
    if (e.shiftKey){ if (document.activeElement===first){ e.preventDefault(); last.focus(); } }
    else if (document.activeElement===last){ e.preventDefault(); first.focus(); }
  }
  function openDialog(){ return settingsEl.classList.contains("show") ? settingsEl : (overlay.classList.contains("show") ? overlay : null); }

  // ---------- Events ----------
  window.addEventListener("keydown", function(e){
    var k=e.key.toLowerCase();
    if (k==="tab"){ var dlg=openDialog(); if (dlg) trapTab(dlg, e); return; }
    if (["arrowup","arrowdown","arrowleft","arrowright"," ","spacebar"].indexOf(k)!==-1) e.preventDefault();
    if (k==="arrowup"||k==="w") inputDir(0,-1);
    else if (k==="arrowdown"||k==="s") inputDir(0,1);
    else if (k==="arrowleft"||k==="a") inputDir(-1,0);
    else if (k==="arrowright"||k==="d") inputDir(1,0);
    else if (k===" "||k==="spacebar"||k==="enter") primary();
    else if (k==="p") togglePause();
    else if (k==="escape"){ if (settingsEl.classList.contains("show")) closeSettings(); else if (state==="playing"||state==="paused") togglePause(); }
    else if (k==="m") toggleMusic();
    else if (k==="c") toggleCRT();
    else if (k==="t") toggleTilt();
    else if (k==="i") toggleAutopilot();
  }, {passive:false});

  overlay.addEventListener("click", function(e){
    var set=e.target.closest("[data-set]");
    if (set){ var key=set.getAttribute("data-set"), val=set.getAttribute("data-val"); if (key==="mode") selectedMode=val; else if (key==="diff") selectedDiff=val; else if (key==="theme") applyTheme(val); showStart(); return; }
    var act=e.target.closest("[data-action]"); if (!act) return;
    var a=act.getAttribute("data-action");
    if (a==="play") start(); else if (a==="resume") togglePause(); else if (a==="menu") goToMenu(); else if (a==="settings") openSettings();
    else if (a==="share") shareCard(); else if (a==="copy") copyCard(); else if (a==="download") downloadCard();
  });

  var dpad=document.getElementById("dpad");
  dpad.addEventListener("pointerdown", function(e){ var b=e.target.closest("button"); if (!b) return; e.preventDefault(); inputDir(parseInt(b.getAttribute("data-dx"),10), parseInt(b.getAttribute("data-dy"),10)); });

  var touchStart=null;
  canvas.addEventListener("pointerdown", function(e){ touchStart={x:e.clientX,y:e.clientY}; });
  canvas.addEventListener("pointerup", function(e){
    if (!touchStart) return;
    var dx=e.clientX-touchStart.x, dy=e.clientY-touchStart.y, adx=Math.abs(dx), ady=Math.abs(dy);
    if (Math.max(adx,ady)<18){ if (state==="ready") start(); touchStart=null; return; }
    if (adx>ady) inputDir(dx>0?1:-1,0); else inputDir(0,dy>0?1:-1);
    touchStart=null;
  });

  aiBtn.addEventListener("click", function(){ toggleAutopilot(); blurActive(); });
  settingsBtn.addEventListener("click", function(){ openSettings(); blurActive(); });
  pauseBtn.addEventListener("click", function(){ if (state==="ready"||state==="over") start(); else togglePause(); blurActive(); });
  settingsEl.addEventListener("click", function(e){
    var row=e.target.closest("[data-toggle]"); if (row){ applyToggle(row.getAttribute("data-toggle")); return; }
    var act=e.target.closest("[data-action]"); if (!act) return;
    var a=act.getAttribute("data-action");
    if (a==="close-settings") closeSettings(); else if (a==="reset") resetPrefs();
  });

  setInterval(updatePauseIcon, 120);
  // Auto-pause on losing focus, but not while the autopilot is driving (you are
  // spectating, and the AI will not crash from neglect).
  document.addEventListener("visibilitychange", function(){ if (document.hidden && state==="playing" && !prefs.autopilot) togglePause(); });
  window.addEventListener("blur", function(){ if (state==="playing" && !prefs.autopilot) togglePause(); });
  window.addEventListener("resize", resize);
  window.addEventListener("orientationchange", function(){ setTimeout(resize, 150); });

  // ---------- Boot ----------
  loadPrefs();
  applyTheme(prefs.theme);
  document.body.classList.toggle("crt-on", prefs.crt);
  updateIcons(); updatePauseIcon();
  resize();
  resetGame();
  showStart();
  startMusicEngine();
  requestAnimationFrame(loop);

  // Register the service worker for offline play and installability (PWA).
  if ("serviceWorker" in navigator) window.addEventListener("load", function(){ navigator.serviceWorker.register("sw.js").catch(function(){}); });
})();
</script>
</body>
</html>
