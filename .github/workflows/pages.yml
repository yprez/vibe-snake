# Build and publish the game to GitHub Pages on every push to main.
#
# Pages serves ONLY the dist/ folder that tools/build.mjs assembles, so repo
# internals (AGENTS.md, docs/, tools/, .claude/) are never exposed on the web.
# One-time setup: repo Settings -> Pages -> Build and deployment -> Source:
# "GitHub Actions".

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write   # required for OIDC; deploy-pages fails without it

concurrency:
  group: pages
  cancel-in-progress: false   # cancelling mid-deploy can leave Pages inconsistent

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'
      - name: Build dist/
        run: node tools/build.mjs
      - name: Setup Pages
        uses: actions/configure-pages@v6
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: dist/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
